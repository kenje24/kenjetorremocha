<svg width="1032" height="320" viewBox="0 0 1032 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1032" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0F16"/>
      <stop offset="1" stop-color="#10141D"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="220" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6F7CFF"/>
      <stop offset="1" stop-color="#8EA2FF"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="296" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C46B5"/>
      <stop offset="1" stop-color="#9A65D6"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="210" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F486E8"/>
      <stop offset="1" stop-color="#D861E6"/>
    </linearGradient>
    <style>
      @keyframes rise {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .title { font: 700 24px Inter, "SF Pro Display", Segoe UI, Arial, sans-serif; fill: #F5F5F7; }
      .chip-text { font: 800 14px Inter, "SF Pro Text", Segoe UI, Arial, sans-serif; fill: #FFFFFF; letter-spacing: 1.8px; }
      .one { animation: rise .7s ease-out both; }
      .two { animation: rise .7s ease-out .08s both; }
      .three { animation: rise .7s ease-out .16s both; }
      .four { animation: rise .7s ease-out .24s both; }
      .five { animation: rise .7s ease-out .32s both; }
      @media (prefers-reduced-motion: reduce) {
        .one, .two, .three, .four, .five { animation: none; }
      }
    </style>
  </defs>

  <rect width="1032" height="320" rx="24" fill="url(#bg)"/>
  <text x="374" y="86" class="title">⚡ Currently Building &amp; Learning</text>

  <g class="one">
    <rect x="116" y="142" width="136" height="36" fill="#151925"/>
    <text x="132" y="165" class="chip-text">🤖 AI AGENTS</text>
  </g>

  <g class="two">
    <rect x="252" y="142" width="228" height="36" fill="url(#blue)"/>
    <text x="269" y="165" class="chip-text">AUTONOMOUS SYSTEMS</text>
  </g>

  <g class="three">
    <rect x="494" y="142" width="90" height="36" fill="#151925"/>
    <text x="512" y="165" class="chip-text">🧠 LLMS</text>
  </g>

  <g class="four">
    <rect x="584" y="142" width="296" height="36" fill="url(#violet)"/>
    <text x="601" y="165" class="chip-text">TRANSFORMER ARCHITECTURES</text>
  </g>

  <g class="five">
    <rect x="333" y="184" width="132" height="36" fill="#151925"/>
    <text x="351" y="207" class="chip-text">💬 CHATBOTS</text>
    <rect x="465" y="184" width="208" height="36" fill="url(#pink)"/>
    <text x="482" y="207" class="chip-text" fill="#111111">CONVERSATIONAL AI</text>
  </g>

  <path d="M480 181H884" stroke="#6474FF" stroke-width="1"/>
  <path d="M333 181H480" stroke="#252A3A" stroke-width="1"/>
</svg>
