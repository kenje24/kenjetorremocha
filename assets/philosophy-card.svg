<svg width="1200" height="190" viewBox="0 0 1200 190" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A12"/>
      <stop offset="0.52" stop-color="#0D111C"/>
      <stop offset="1" stop-color="#070A12"/>
    </linearGradient>
    <linearGradient id="edge" x1="180" y1="36" x2="1020" y2="154" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#A78BFA" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#F472B6" stop-opacity="0.5"/>
    </linearGradient>
    <style>
      @keyframes glow {
        0%, 100% { opacity: .45; }
        50% { opacity: .9; }
      }
      .quote { font: 800 27px Inter, "SF Pro Display", Segoe UI, Arial, sans-serif; fill: #F5F5F7; }
      .muted { fill: #9CA3AF; }
      .pulse { animation: glow 3.2s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .pulse { animation: none; }
      }
    </style>
  </defs>
  <rect width="1200" height="190" rx="24" fill="url(#bg)"/>
  <rect x="86" y="38" width="1028" height="114" rx="20" stroke="url(#edge)" stroke-width="1.2"/>
  <circle class="pulse" cx="188" cy="95" r="34" fill="#38BDF8" fill-opacity=".12"/>
  <circle class="pulse" cx="1012" cy="95" r="34" fill="#F472B6" fill-opacity=".12"/>
  <text x="600" y="86" text-anchor="middle" class="quote">Technology should not exist to impress developers.</text>
  <text x="600" y="122" text-anchor="middle" class="quote muted">Technology should exist to solve problems.</text>
</svg>
